<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Summary Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css">
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
        /* Fallback layout styles for Safari (in case Tailwind CDN doesn't load) */
        .layout-flex { display: flex; gap: 1.5rem; }
        .sidebar { width: 288px; flex-shrink: 0; }
        .main-content { flex: 1; min-width: 0; }
        .sidebar-card { background: white; border-radius: 0.75rem; border: 1px solid #e5e7eb; padding: 1rem; position: sticky; top: 2rem; }
        .sidebar-list { max-height: calc(100vh - 250px); overflow-y: auto; }
        .sidebar-item { display: block; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid #f3f4f6; margin-bottom: 0.5rem; text-decoration: none; color: inherit; }
        .sidebar-item:hover { background: #eff6ff; border-color: #bfdbfe; }
        .sidebar-item-flex { display: flex; gap: 0.5rem; align-items: center; }
        .sidebar-thumb { width: 56px; height: 36px; object-fit: cover; border-radius: 0.25rem; flex-shrink: 0; }
        .sidebar-title { font-size: 0.75rem; font-weight: 500; color: #1f2937; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.25; }
        .sidebar-date { font-size: 10px; color: #9ca3af; margin-top: 2px; }
        .sidebar-tag { background: #dbeafe; color: #1d4ed8; font-size: 10px; padding: 1px 6px; border-radius: 4px; display: inline-block; margin: 2px 2px 0 0; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="mb-8">
            <a href="/" class="text-2xl font-bold text-gray-800 hover:text-gray-600">
                YouTube Summary Generator
            </a>
        </header>
        {% block content %}{% endblock %}
        <footer class="mt-12 text-center text-gray-400 text-sm">
            v1 &middot; Powered by Gemini, Claude &amp; GPT
        </footer>
    </div>
<script>
document.body.addEventListener("htmx:afterSwap", function(event) {
    var container = document.getElementById("summary-container");
    if (!container || !container.dataset.jobId) return;

    var jobId = container.dataset.jobId;
    container.removeAttribute("data-job-id");

    var source = new EventSource("/summarize/stream/" + jobId);
    var metadata = document.getElementById("stream-metadata");
    var content = document.getElementById("stream-content");
    var errorDiv = document.getElementById("stream-error");

    var status = document.getElementById("stream-status");

    source.addEventListener("metadata", function(e) {
        status.style.display = "none";
        metadata.innerHTML = e.data;
    });

    source.addEventListener("chunk", function(e) {
        status.style.display = "none";
        content.innerHTML += e.data;
    });

    source.addEventListener("done", function(e) {
        status.style.display = "none";
        content.innerHTML = e.data;
        source.close();
    });

    source.addEventListener("error", function(e) {
        status.style.display = "none";
        if (e.data) {
            errorDiv.textContent = e.data;
        } else {
            errorDiv.textContent = "Connection error. Please try again.";
        }
        source.close();
    });
});
</script>
</body>
</html>
