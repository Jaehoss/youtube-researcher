{% if streaming %}
<div style="background: white; border-radius: 0.75rem; border: 1px solid #e5e7eb; padding: 1.5rem;" id="summary-container" data-job-id="{{ job_id }}">
    <div id="stream-status" style="text-align: center; padding: 1rem;">
        <div style="display: inline-block; width: 32px; height: 32px; border: 4px solid #2563eb; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 0.5rem; color: #6b7280;">영상 분석 중...</p>
    </div>
    <div id="stream-metadata"></div>
    <div class="markdown-body" style="margin-top: 1rem;">
        <div id="stream-content"></div>
    </div>
    <div id="stream-error" style="color: #ef4444; font-weight: 500; padding: 1rem;"></div>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
{% endif %}
